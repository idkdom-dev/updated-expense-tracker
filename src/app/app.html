<mat-toolbar color="primary">
  <span class="spacer">Expense Tracker</span>
  <div>
    @if (authService.isLoggedIn()) {
      <button mat-button routerLink="">Dashboard</button>
      <button mat-button routerLink="add">Add Transaction</button>
      <button mat-button routerLink="expenses">View Transactions</button>
      <button mat-button routerLink="account">Manage Account</button>
      <button mat-button (click)="authService.signOutUser()">Logout</button>
    } @else {
      <button mat-button routerLink="login">Login</button>
      <button mat-stroked-button routerLink="register">Register</button>
    }
  </div>
</mat-toolbar>
<router-outlet />
