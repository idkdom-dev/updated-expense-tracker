<div class="card mb-3">
  <div class="card-body d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-1">{{ expense?.title }}</h5>
      <small class="fw-semibold" style="color: teal"> {{ expense?.category }} </small>
    </div>
    <div class="text-end">
      <div class="fw-bold text-danger">
        {{
          expense
            ? expense.amount.toLocaleString('en-US', { style: 'currency', currency: 'USD' })
            : ''
        }}
      </div>
      <a class="btn btn-primary btn-sm m-2" routerLink="edit-expense">Edit</a>
      <a class="btn btn-danger btn-sm m-2" routerLink="">Delete</a>
    </div>
  </div>
</div>
