<div
  class="card mb-3"
  [class.highlighted]="highlight()"
  [class.category-work]="expense()?.category === 'Work'"
  [class.category-personal]="expense()?.category === 'Personal'"
  [class.category-grocery]="expense()?.category === 'Grocery'"
  [class.category-utilities]="expense()?.category === 'Utilities'"
  [class.category-shopping]="expense()?.category === 'Shopping'"
  [class.category-travel]="expense()?.category === 'Travel'"
  [class.category-food]="expense()?.category === 'Food'"
>
  <div class="card-body d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-1">{{ expense()?.title || 'Untitled' }}</h5>
      <small class="fw-semibold category-label">
        {{ expense()?.category || 'Uncategorized' }}
      </small>
    </div>
    <div class="text-end">
      <div class="fw-bold text-danger">
        {{
          expense()?.amount?.toLocaleString('en-US', { style: 'currency', currency: 'USD' }) ||
            '$0.00'
        }}
      </div>
      <a class="btn btn-primary btn-sm m-2" [routerLink]="['/edit', expense()?.id]"> Edit </a>
      <button type="button" class="btn btn-danger btn-sm m-2" (click)="deleteExpense()">
        Delete
      </button>
    </div>
  </div>
</div>
