@if (expense(); as exp) {
  <mat-card class="expense-card" [class.highlighted]="highlight()">
    <mat-card-content class="card-content">
      <div class="expense-info">
        <div class="expense-header">
          <mat-icon class="category-icon" [style.color]="getCategoryColor(exp.category)">
            {{ getCategoryIcon(exp.category) }}
          </mat-icon>
          <div class="expense-details">
            <h3 class="expense-title">{{ exp.title || 'Untitled' }}</h3>
            <span class="expense-category">
              {{ exp.category || 'Uncategorized' }}
            </span>
          </div>
        </div>
      </div>
      <div class="expense-actions">
        <div class="amount">
          {{ exp.amount | currency: 'USD' : 'symbol' : '1.2-2' }}
        </div>
        <a mat-icon-button [routerLink]="['/edit', exp.id]" matTooltip="Edit">
          <mat-icon>edit</mat-icon>
        </a>
        <button
          type="button"
          mat-icon-button
          (click)="deleteExpense()"
          matTooltip="Delete"
          color="warn"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>
}
