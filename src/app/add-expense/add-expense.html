<div class="container mt-4">
  <h2 class="text-center mb-4">Add Expense</h2>
  <div class="row justify-content-center">
    <div class="col-md-6">
      <form class="card-body" (ngSubmit)="addExpense()" #f="ngForm">
        <div class="mb-3">
          <label class="form-label">Expense Name</label>
          <input
            name="title"
            [(ngModel)]="title"
            required
            type="text"
            class="form-control"
            placeholder="Enter expense name"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Amount ($)</label>
          <input
            name="amount"
            [(ngModel)]="amount"
            required
            type="number"
            class="form-control"
            placeholder="Enter amount"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <select name="category" [(ngModel)]="category" required class="form-select">
            <option value disabled selected>Select category</option>
            <option *ngFor="let category of expenseService.categories()" [value]="category">
              {{ category }}
            </option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Add Expense</button>
      </form>
    </div>
  </div>
</div>
