<div class="add-expense-container">
  <mat-card class="expense-card">
    <mat-card-header>
      <mat-card-title>Add Transaction</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (error()) {
        <div class="error-alert">
          <mat-icon>error</mat-icon>
          <span>{{ error() }}</span>
        </div>
      }

      <form (ngSubmit)="addExpense()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Transaction Type</mat-label>
          <mat-select [(ngModel)]="transactionType" name="transactionType" required>
            <mat-option value="expense">Expense</mat-option>
            <mat-option value="income">Income</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Transaction Name</mat-label>
          <input
            matInput
            type="text"
            [(ngModel)]="title"
            name="title"
            placeholder="Enter transaction name"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Amount ($)</mat-label>
          <input
            matInput
            type="number"
            [(ngModel)]="amount"
            name="amount"
            placeholder="Enter amount"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Category</mat-label>
          <mat-select [(ngModel)]="category" name="category" required>
            @for (cat of categoryList; track cat) {
              <mat-option [value]="cat">{{ cat }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Date</mat-label>
          <input matInput type="date" [(ngModel)]="date" name="date" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description (Optional)</mat-label>
          <textarea
            matInput
            [(ngModel)]="description"
            name="description"
            placeholder="Enter transaction description"
            rows="3"
          ></textarea>
        </mat-form-field>

        <div class="button-group">
          <button type="submit" mat-raised-button color="primary" [disabled]="loading()">
            @if (loading()) {
              <ng-container>
                <mat-icon>hourglass_empty</mat-icon>
                Adding...
              </ng-container>
            } @else {
              <ng-container>
                <mat-icon>add</mat-icon>
                Add Transaction
              </ng-container>
            }
          </button>
        </div>
      </form>

      <mat-divider class="divider"></mat-divider>

      <div class="add-category-section">
        <button mat-button (click)="toggleAddCategoryForm()" type="button">
          @if (showAddCategoryForm()) {
            <ng-container>
              <mat-icon>expand_less</mat-icon>
              Hide Add Category Form
            </ng-container>
          } @else {
            <ng-container>
              <mat-icon>expand_more</mat-icon>
              Add New Category
            </ng-container>
          }
        </button>

        @if (showAddCategoryForm()) {
          <form class="category-form" (ngSubmit)="addCategory()">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Category Name</mat-label>
              <input
                matInput
                type="text"
                [(ngModel)]="newCategoryName"
                name="newCategoryName"
                placeholder="Enter category name"
                required
              />
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Icon</mat-label>
              <input
                matInput
                type="text"
                [(ngModel)]="newCategoryIcon"
                name="newCategoryIcon"
                placeholder="Enter Material icon name"
              />
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Color</mat-label>
              <input matInput type="color" [(ngModel)]="newCategoryColor" name="newCategoryColor" />
            </mat-form-field>

            <button type="submit" mat-raised-button color="accent" [disabled]="loading()">
              Create Category
            </button>
          </form>
        }
      </div>
    </mat-card-content>
  </mat-card>
</div>
