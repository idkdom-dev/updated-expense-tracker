<div class="edit-expense-container">
  <mat-card class="expense-card">
    <mat-card-header>
      <mat-card-title>Edit Transaction</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (error()) {
        <div class="error-alert">
          <mat-icon>error</mat-icon>
          <span>{{ error() }}</span>
        </div>
      }

      <form (ngSubmit)="saveExpense()">
        <p class="expense-id-text"><strong>Transaction ID:</strong> {{ id }}</p>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Transaction Type</mat-label>
          <mat-select [(ngModel)]="transactionType" name="transactionType" required>
            <mat-option value="expense">Expense</mat-option>
            <mat-option value="income">Income</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Transaction Name</mat-label>
          <input
            matInput
            type="text"
            [(ngModel)]="title"
            name="title"
            placeholder="Enter transaction name"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Amount ($)</mat-label>
          <input
            matInput
            type="number"
            [(ngModel)]="amount"
            name="amount"
            placeholder="Enter amount"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Category</mat-label>
          <mat-select [(ngModel)]="category" name="category" required>
            @for (cat of categoryList; track cat) {
              <mat-option [value]="cat">{{ cat }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Date</mat-label>
          <input matInput type="date" [(ngModel)]="date" name="date" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description (Optional)</mat-label>
          <textarea
            matInput
            [(ngModel)]="description"
            name="description"
            placeholder="Enter transaction description"
            rows="3"
          ></textarea>
        </mat-form-field>

        <div class="button-group">
          <button type="submit" mat-raised-button color="primary" [disabled]="loading()">
            @if (loading()) {
              <ng-container>
                <mat-icon>hourglass_empty</mat-icon>
                Saving...
              </ng-container>
            } @else {
              <ng-container>
                <mat-icon>save</mat-icon>
                Save Transaction
              </ng-container>
            }
          </button>
          <button
            type="button"
            mat-raised-button
            color="warn"
            (click)="deleteExpense()"
            [disabled]="loading()"
          >
            <mat-icon>delete</mat-icon>
            Delete
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
